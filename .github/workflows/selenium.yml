name: Selemium Tests Suite with Allure Report
on:
  push:
    branches: [ master ]

permissions:
    contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      - name: Install Allure
        run: |
            ALLURE_VERSION=2.24.0
            wget https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
            tar -zxvf allure-${ALLURE_VERSION}.tgz
            echo "$PWD/allure-${ALLURE_VERSION}/bin" >> $GITHUB_PATH

      - name: verify allure installation
        run: allure --version

      - name: Start Selenium Grid
        run: docker compose -f docker-compose-v3.yml up -d

      - name: show docker containers
        run: docker ps -a

      - name: show docker logs
        run: docker compose logs

      - name: Wait for Selenium Grid to be ready
        run: |
            echo "Waiting for Selenium Grid to be ready..."
            for i in {1..30}; do
              STATUS=$(curl -s http://localhost:4444/status ||  echo "offline")
              if echo "$STATUS" | grep -q '"ready":true'; then
                echo "Selenium Grid is ready!"
                exit 0
              fi
              echo "Selenium Grid is not ready yet. Retrying in 5 seconds..."
              sleep 3
            done
            echo "Selenium Grid is ready!"
            exit 1

      - name: run tests
        run: mvn clean verify

      - name: Generate Allure Report
        run: allure generate target/allure-results --clean -o allure-report

      - name: Prepare report for pages
        run: |
          mkdir public
          cp -r allure-report/* public/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

      - name: Notify about report deployment
        run: |
          echo "Allure report has been deployed to GitHub Pages." >> $GITHUB_STEP_SUMMARY
          echo "You can view it at: https://${{github.repository_owner}}.github.io/${{github.event.repository.name}}/" >> $GITHUB_STEP_SUMMARY